<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Update Password | TradeEdge</title>
    
    <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2.39.7/dist/umd/supabase.js"></script>
    <link href="https://fonts.googleapis.com/css2?family=Plus+Jakarta+Sans:wght@400;500;600;700;800&display=swap" rel="stylesheet">

    <style>
        :root {
            --bg: #030712;
            --card: rgba(15, 23, 42, 0.7);
            --neon: #38bdf8;
            --neon-glow: rgba(56, 189, 248, 0.4);
            --text-main: #f8fafc;
            --text-muted: #94a3b8;
            --border: #1e293b;
        }

        * { margin: 0; padding: 0; box-sizing: border-box; }
        
        body { 
            font-family: 'Plus Jakarta Sans', sans-serif; 
            background: var(--bg); 
            color: var(--text-main); 
            min-height: 100vh;
            display: flex;
            align-items: center;
            justify-content: center;
            padding: 2rem;
        }

        .neon-blur {
            position: fixed;
            width: 400px;
            height: 400px;
            background: var(--neon);
            filter: blur(150px);
            opacity: 0.1;
            border-radius: 50%;
            z-index: -1;
        }

        .auth-card {
            background: var(--card);
            backdrop-filter: blur(20px);
            border: 1px solid var(--border);
            padding: 3.5rem 3rem;
            border-radius: 32px;
            width: 100%;
            max-width: 450px;
            box-shadow: 0 25px 50px rgba(0,0,0,0.5);
            text-align: center;
        }

        h2 { font-size: 2rem; font-weight: 800; margin-bottom: 0.5rem; letter-spacing: -1px; }
        p { color: var(--text-muted); margin-bottom: 2.5rem; font-size: 0.95rem; }

        .form-group { text-align: left; margin-bottom: 1.5rem; }
        .form-group label { display: block; margin-bottom: 0.5rem; color: var(--text-muted); font-size: 0.8rem; font-weight: 700; text-transform: uppercase; }
        
        input {
            width: 100%;
            padding: 14px 18px;
            background: rgba(3, 7, 18, 0.5);
            border: 1px solid var(--border);
            color: white;
            border-radius: 12px;
            font-family: inherit;
        }
        input:focus { border-color: var(--neon); outline: none; box-shadow: 0 0 15px var(--neon-glow); }

        .btn-neon {
            background: var(--neon);
            color: #000;
            width: 100%;
            padding: 16px;
            border: none;
            border-radius: 12px;
            font-weight: 800;
            cursor: pointer;
            transition: 0.3s;
            text-transform: uppercase;
        }
        .btn-neon:hover { transform: translateY(-2px); box-shadow: 0 10px 25px var(--neon-glow); }

        .status-msg { margin-top: 1rem; padding: 12px; border-radius: 8px; font-size: 0.9rem; display: none; }
        .error { background: rgba(239, 68, 68, 0.1); color: #ef4444; border: 1px solid rgba(239, 68, 68, 0.2); }
        .success { background: rgba(16, 185, 129, 0.1); color: #10b981; border: 1px solid rgba(16, 185, 129, 0.2); }
    </style>
</head>
<body>

    <div class="neon-blur"></div>

    <div class="auth-card">
        <h2>Set New Password</h2>
        <p>Your identity has been verified. Choose a strong new password for your terminal access.</p>
        
        <form id="update-password-form">
            <div class="form-group">
                <label>New Password</label>
                <input type="password" id="new-password" required placeholder="••••••••">
            </div>
            <button type="submit" class="btn-neon" id="update-btn">Update Password</button>
            <div id="status-msg" class="status-msg"></div>
        </form>
    </div>

    <script>
        const SUPABASE_URL = 'https://mdefpesnbawqlzfygaqt.supabase.co'; 
        const SUPABASE_KEY = 'eyJhbGciOiJIUzI1NiIsInR5cCI6IkpXVCJ9.eyJpc3MiOiJzdXBhYmFzZSIsInJlZiI6Im1kZWZwZXNuYmF3cWx6ZnlnYXF0Iiwicm9sZSI6ImFub24iLCJpYXQiOjE3NzU1NzQ0NzAsImV4cCI6MjA5MTE1MDQ3MH0.aORQwc6xJXeVmwTsa2Ql_bpCQTThwFfEYYjZKNTlNAg'; 
        const supabaseClient = supabase.createClient(SUPABASE_URL, SUPABASE_KEY);

        const updateForm = document.getElementById('update-password-form');
        const statusMsg = document.getElementById('status-msg');
        const updateBtn = document.getElementById('update-btn');

        updateForm.addEventListener('submit', async (e) => {
            e.preventDefault();
            const newPassword = document.getElementById('new-password').value;

            updateBtn.disabled = true;
            updateBtn.innerText = "Syncing...";

            const { data, error } = await supabaseClient.auth.updateUser({
                password: newPassword
            });

            if (error) {
                statusMsg.innerText = error.message;
                statusMsg.className = "status-msg error";
                statusMsg.style.display = "block";
                updateBtn.disabled = false;
                updateBtn.innerText = "Update Password";
            } else {
                statusMsg.innerText = "Password updated! Redirecting to login...";
                statusMsg.className = "status-msg success";
                statusMsg.style.display = "block";
                
                setTimeout(() => {
                    window.location.href = "login.html";
                }, 2000);
            }
        });
    </script>
</body>
</html>
