<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Welcome to the Team | TradeEdge</title>
    <link rel="stylesheet" href="style.css">
    <style>
        .success-container {
            min-height: 80vh;
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            text-align: center;
            padding: 2rem;
        }
        .check-icon {
            width: 80px;
            height: 80px;
            background: var(--accent-green);
            color: var(--bg-dark);
            border-radius: 50%;
            display: flex;
            align-items: center;
            justify-content: center;
            font-size: 2.5rem;
            margin-bottom: 2rem;
            box-shadow: 0 0 30px rgba(0, 250, 154, 0.3);
        }
    </style>
</head>
<body>

    <div class="success-container">
        <div class="check-icon">✓</div>
        <h1 style="font-size: 3rem; margin-bottom: 1rem;">You're In!</h1>
        <p style="color: var(--text-muted); max-width: 500px; margin-bottom: 2.5rem; line-height: 1.6;">
            Your payment was successful. A confirmation receipt has been sent to your email. You now have full access to the TradeEdge ecosystem.
        </p>
        
        <div style="display: flex; gap: 1rem;">
            <a href="dashboard.html" class="btn-solid">Go to Dashboard</a>
            <a href="index.html" class="btn-outline">Back to Home</a>
        </div>

        <div style="margin-top: 4rem; color: #475569; font-size: 0.9rem;">
            Need help? <a href="contact.html" style="color: var(--accent-green);">Contact Support</a>
        </div>
    </div>

</body>
</html>
