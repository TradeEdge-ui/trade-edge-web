<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Secure Reset | TradeEdge</title>
    
    <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2.39.7/dist/umd/supabase.js"></script>
    <link href="https://fonts.googleapis.com/css2?family=Plus+Jakarta+Sans:wght@400;500;600;700;800&display=swap" rel="stylesheet">
    <script src="https://unpkg.com/scrollreveal"></script>

    <style>
        :root {
            --bg: #030712;
            --card: rgba(15, 23, 42, 0.7);
            --neon: #38bdf8;
            --neon-glow: rgba(56, 189, 248, 0.4);
            --text-main: #f8fafc;
            --text-muted: #94a3b8;
            --border: #1e293b;
        }

        * { margin: 0; padding: 0; box-sizing: border-box; }
        
        body { 
            font-family: 'Plus Jakarta Sans', sans-serif; 
            background: var(--bg); 
            color: var(--text-main); 
            min-height: 100vh;
            display: flex;
            align-items: center;
            justify-content: center;
            padding: 2rem;
            overflow: hidden;
        }

        /* --- BACKGROUND BLUR --- */
        .neon-blur {
            position: fixed;
            width: 500px;
            height: 500px;
            background: var(--neon);
            filter: blur(180px);
            opacity: 0.1;
            border-radius: 50%;
            z-index: -1;
        }

        /* --- AUTH CARD --- */
        .auth-card {
            background: var(--card);
            backdrop-filter: blur(20px);
            border: 1px solid var(--border);
            padding: 3.5rem 3rem;
            border-radius: 32px;
            width: 100%;
            max-width: 480px;
            box-shadow: 0 25px 50px rgba(0,0,0,0.5);
            text-align: center;
        }

        .logo { font-weight: 800; font-size: 1.5rem; margin-bottom: 2rem; letter-spacing: -1px; }
        .logo a { color: var(--text-main); text-decoration: none; }
        .logo span { color: var(--neon); }

        h2 { font-size: 2rem; font-weight: 800; margin-bottom: 0.5rem; letter-spacing: -1px; }
        p { color: var(--text-muted); margin-bottom: 2.5rem; font-size: 0.95rem; line-height: 1.6; }

        .form-group { text-align: left; margin-bottom: 1.5rem; }
        .form-group label { display: block; margin-bottom: 0.5rem; color: var(--text-muted); font-size: 0.85rem; font-weight: 700; text-transform: uppercase; letter-spacing: 1px; }
        
        input {
            width: 100%;
            padding: 14px 18px;
            background: rgba(3, 7, 18, 0.5);
            border: 1px solid var(--border);
            color: white;
            border-radius: 12px;
            font-family: inherit;
            transition: 0.3s;
        }
        input:focus { border-color: var(--neon); box-shadow: 0 0 15px var(--neon-glow); outline: none; }

        .btn-neon {
            background: var(--neon);
            color: #000;
            width: 100%;
            padding: 16px;
            border: none;
            border-radius: 12px;
            font-weight: 800;
            font-size: 1rem;
            cursor: pointer;
            transition: 0.3s;
            box-shadow: 0 8px 20px var(--neon-glow);
            text-transform: uppercase;
        }
        .btn-neon:hover { transform: translateY(-2px); box-shadow: 0 12px 30px var(--neon-glow); }
        .btn-neon:disabled { background: var(--text-muted); cursor: not-allowed; box-shadow: none; }

        .status-msg { margin-top: 1rem; padding: 12px; border-radius: 8px; font-size: 0.9rem; display: none; }
        .error { background: rgba(239, 68, 68, 0.1); color: #ef4444; border: 1px solid rgba(239, 68, 68, 0.2); }
        .success { background: rgba(16, 185, 129, 0.1); color: #10b981; border: 1px solid rgba(16, 185, 129, 0.2); }

        .back-link { 
            display: inline-block; 
            margin-top: 2rem; 
            color: var(--neon); 
            text-decoration: none; 
            font-size: 0.9rem; 
            font-weight: 600; 
            transition: 0.3s;
        }
        .back-link:hover { opacity: 0.8; transform: translateX(-5px); }
    </style>
</head>
<body>

    <div class="neon-blur"></div>

    <div class="auth-card reveal">
        <div class="logo"><a href="index.html">TRADE<span>EDGE</span></a></div>
        <h2>Reset Access</h2>
        <p>Enter your encrypted email address. We will send a secure recovery link to your inbox.</p>
        
        <form id="reset-form">
            <div class="form-group">
                <label>Registered Email</label>
                <input type="email" id="email" required placeholder="trader@example.com">
            </div>
            <button type="submit" class="btn-neon" id="reset-btn">Send Recovery Link</button>
            <div id="status-msg" class="status-msg"></div>
        </form>

        <a href="login.html" class="back-link">← Return to Login</a>
    </div>

    <script>
        // --- SUPABASE CONFIG ---
        const SUPABASE_URL = 'https://mdefpesnbawqlzfygaqt.supabase.co'; 
        const SUPABASE_KEY = 'eyJhbGciOiJIUzI1NiIsInR5cCI6IkpXVCJ9.eyJpc3MiOiJzdXBhYmFzZSIsInJlZiI6Im1kZWZwZXNuYmF3cWx6ZnlnYXF0Iiwicm9sZSI6ImFub24iLCJpYXQiOjE3NzU1NzQ0NzAsImV4cCI6MjA5MTE1MDQ3MH0.aORQwc6xJXeVmwTsa2Ql_bpCQTThwFfEYYjZKNTlNAg'; 
        const supabaseClient = supabase.createClient(SUPABASE_URL, SUPABASE_KEY);

        const resetForm = document.getElementById('reset-form');
        const statusMsg = document.getElementById('status-msg');
        const resetBtn = document.getElementById('reset-btn');

        resetForm.addEventListener('submit', async (e) => {
            e.preventDefault();
            const email = document.getElementById('email').value;

            resetBtn.disabled = true;
            resetBtn.innerText = "Processing...";
            statusMsg.style.display = "none";

            const { data, error } = await supabaseClient.auth.resetPasswordForEmail(email, {
                redirectTo: window.location.origin + '/update-password.html',
            });

            if (error) {
                statusMsg.innerText = error.message;
                statusMsg.className = "status-msg error";
                statusMsg.style.display = "block";
                resetBtn.disabled = false;
                resetBtn.innerText = "Send Recovery Link";
            } else {
                statusMsg.innerText = "Recovery link sent! Check your inbox.";
                statusMsg.className = "status-msg success";
                statusMsg.style.display = "block";
                resetBtn.innerText = "Email Sent";
            }
        });

        // --- ANIMATION ---
        ScrollReveal().reveal('.reveal', { 
            duration: 1000, 
            distance: '30px', 
            origin: 'bottom', 
            opacity: 0, 
            easing: 'cubic-bezier(0.5, 0, 0, 1)' 
        });
    </script>
</body>
</html>
