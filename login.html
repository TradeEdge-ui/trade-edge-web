<!DOCTYPE html>
<html lang="en">
<head>

    <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2.39.7/dist/umd/supabase.js"></script>
<script>
// 1. Same Connection Details as Register
const SUPABASE_URL = 'https://mdefpesnbawqlzfygaqt.supabase.co';
const SUPABASE_KEY = 'eyJhbGciOiJIUzI1NiIsInR5cCI6IkpXVCJ9.eyJpc3MiOiJzdXBhYmFzZSIsInJlZiI6Im1kZWZwZXNuYmF3cWx6ZnlnYXF0Iiwicm9sZSI6ImFub24iLCJpYXQiOjE3NzU1NzQ0NzAsImV4cCI6MjA5MTE1MDQ3MH0.aORQwc6xJXeVmwTsa2Ql_bpCQTThwFfEYYjZKNTlNAg'; // Use the long one you found!
const supabaseClient = supabase.createClient(SUPABASE_URL, SUPABASE_KEY);

// 2. The Login Function
async function handleLogin(event) {
    event.preventDefault();
    
    const email = document.getElementById('email').value;
    const password = document.getElementById('password').value;
    const submitBtn = event.target.querySelector('button');

    submitBtn.innerText = "Authenticating...";
    submitBtn.disabled = true;

    // 3. Tell Supabase to check the credentials
    const { data, error } = await supabaseClient.auth.signInWithPassword({
        email: email,
        password: password,
    });

    if (error) {
        alert("Login Failed: " + error.message);
        submitBtn.innerText = "Access Dashboard";
        submitBtn.disabled = false;
    } else {
        // SUCCESS! Redirect to the protected dashboard
        console.log("Logged in:", data.user);
        window.location.href = "dashboard.html";
    }
}
</script>

    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Student Login | TradeEdge</title>
    <link rel="stylesheet" href="style.css">
    <style>
        /* Specific layout for the login screen */
        .auth-container {
            min-height: calc(100vh - 80px); /* Accounts for header */
            display: flex;
            align-items: center;
            justify-content: center;
            padding: 2rem;
            background: radial-gradient(circle at center, #152336 0%, var(--bg-dark) 100%);
        }
        .auth-card {
            background: var(--bg-card);
            border: 1px solid #1e293b;
            padding: 3rem;
            border-radius: 12px;
            width: 100%;
            max-width: 450px;
            box-shadow: 0 10px 30px rgba(0,0,0,0.5);
        }
        .auth-card h2 {
            text-align: center;
            margin-bottom: 2rem;
            font-size: 2rem;
        }
        .form-group {
            margin-bottom: 1.5rem;
        }
        .form-group label {
            display: block;
            margin-bottom: 0.5rem;
            color: var(--text-muted);
            font-size: 0.9rem;
        }
        .form-group input {
            width: 100%;
            padding: 0.8rem 1rem;
            background: var(--bg-dark);
            border: 1px solid #1e293b;
            color: white;
            border-radius: 4px;
            font-size: 1rem;
            transition: border-color 0.3s;
        }
        .form-group input:focus {
            outline: none;
            border-color: var(--accent-green);
        }
        .forgot-pass {
            display: block;
            text-align: right;
            font-size: 0.85rem;
            color: var(--accent-green);
            margin-bottom: 1.5rem;
        }
        .forgot-pass:hover {
            color: var(--accent-hover);
        }
    </style>
</head>
<body>

    <header>
        <div class="logo"><a href="index.html">Trade<span>Edge</span></a></div>
        <a href="index.html" class="btn-outline">Back to Home</a>
    </header>

    <div class="auth-container">
        <div class="auth-card">
            <h2>Welcome Back</h2>
            <form onsubmit="handleLogin(event)">
    <div class="form-group">
        <label>Email</label>
        <input type="email" id="email" required>
    </div>
    <div class="form-group">
        <label>Password</label>
        <input type="password" id="password" required>
    </div>
                <a href="forgot-password.html" class="forgot-pass">Forgot Password?</a>

                <button type="submit" class="btn-solid" style="width: 100%;">Access Dashboard</button>

                <div style="text-align: center; margin-top: 2rem; font-size: 0.9rem; color: var(--text-muted);">
                  New to TradeEdge? <a href="register.html" style="color: var(--accent-green); font-weight: 600;">Create an Account</a>
                </div>
            </form>
        </div>
    </div>

</body>
</html>
