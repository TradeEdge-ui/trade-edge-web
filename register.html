<!DOCTYPE html>
<html lang="en">
<head>

    <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2.39.7/dist/umd/supabase.js"></script>
<script>
// 1. Connection Details (Renamed variable to supabaseClient)
const SUPABASE_URL = 'https://mdefpesnbawqlzfygaqt.supabase.co';
const SUPABASE_KEY = 'eyJhbGciOiJIUzI1NiIsInR5cCI6IkpXVCJ9.eyJpc3MiOiJzdXBhYmFzZSIsInJlZiI6Im1kZWZwZXNuYmF3cWx6ZnlnYXF0Iiwicm9sZSI6ImFub24iLCJpYXQiOjE3NzU1NzQ0NzAsImV4cCI6MjA5MTE1MDQ3MH0.aORQwc6xJXeVmwTsa2Ql_bpCQTThwFfEYYjZKNTlNAg';
const supabaseClient = supabase.createClient(SUPABASE_URL, SUPABASE_KEY);

// 2. The Signup Function
async function handleSignup(event) {
    event.preventDefault(); 
    
    // Grab the button to show it's working
    const submitBtn = event.target.querySelector('button');
    submitBtn.innerText = "Processing...";
    submitBtn.disabled = true;

    const email = document.getElementById('email').value;
    const password = document.getElementById('password').value;

    console.log("Attempting signup for:", email);

    // 3. Use supabaseClient here
    const { data, error } = await supabaseClient.auth.signUp({
        email: email,
        password: password,
    });

    if (error) {
        console.error("Supabase Error:", error.message);
        alert("Error: " + error.message);
        submitBtn.innerText = "Create Account";
        submitBtn.disabled = false;
    } else {
        console.log("Signup success:", data);
        alert("Success! Please check your email for a confirmation link.");
        window.location.href = "login.html";
    }
}
</script>

    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Create Account | TradeEdge</title>
    <link rel="stylesheet" href="style.css">
    <style>
        .auth-container {
            min-height: calc(100vh - 80px);
            display: flex;
            align-items: center;
            justify-content: center;
            padding: 2rem;
            background: radial-gradient(circle at center, #152336 0%, var(--bg-dark) 100%);
        }
        .auth-card {
            background: var(--bg-card);
            border: 1px solid #1e293b;
            padding: 3rem;
            border-radius: 12px;
            width: 100%;
            max-width: 500px;
        }
        .form-row { display: grid; grid-template-columns: 1fr 1fr; gap: 1rem; }
        .form-group { margin-bottom: 1.2rem; }
        .form-group label { display: block; margin-bottom: 0.4rem; color: var(--text-muted); font-size: 0.85rem; }
        .form-group input {
            width: 100%;
            padding: 0.8rem;
            background: var(--bg-dark);
            border: 1px solid #1e293b;
            color: white;
            border-radius: 4px;
        }
    </style>
</head>
<body>

    <header>
        <div class="logo"><a href="index.html">Trade<span>Edge</span></a></div>
        <p style="font-size: 0.9rem; color: var(--text-muted);">Already have an account? <a href="login.html" style="color: var(--accent-green);">Login</a></p>
    </header>

    <div class="auth-container">
        <div class="auth-card">
            <h2 style="text-align: center; margin-bottom: 2rem;">Join the Program</h2>
            <form onsubmit="handleSignup(event)">
    <div class="form-row">
        <div class="form-group">
            <label>First Name</label>
            <input type="text" required>
        </div>
        <div class="form-group">
            <label>Last Name</label>
            <input type="text" required>
        </div>
    </div>

    <div class="form-group">
        <label>Email Address</label>
        <input type="email" id="email" required placeholder="trader@example.com">
    </div>

    <div class="form-group">
        <label>Create Password</label>
        <input type="password" id="password" required placeholder="**********">
    </div>

    <div class="form-group">
        <label>Confirm Password</label>
        <input type="password" required placeholder="**********">
    </div>

    <p style="font-size: 0.75rem; color: #475569; margin-bottom: 1.5rem;">
        By clicking "Create Account", you agree to our <a href="legal.html" style="text-decoration: underline;">Terms of Service</a>
    </p>

    <button type="submit" class="btn-solid" style="width: 100%;">Create Account</button>
</form>
        </div>
    </div>

</body>
</html>
