<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Reset Password | TradeEdge</title>
    <link rel="stylesheet" href="style.css">
    <style>
        .auth-container {
            min-height: calc(100vh - 80px);
            display: flex;
            align-items: center;
            justify-content: center;
            padding: 2rem;
            background: radial-gradient(circle at center, #152336 0%, var(--bg-dark) 100%);
        }
        .auth-card {
            background: var(--bg-card);
            border: 1px solid #1e293b;
            padding: 3rem;
            border-radius: 12px;
            width: 100%;
            max-width: 450px;
            box-shadow: 0 10px 30px rgba(0,0,0,0.5);
            text-align: center;
        }
        .auth-card h2 { margin-bottom: 1rem; }
        .auth-card p { color: var(--text-muted); margin-bottom: 2rem; font-size: 0.9rem; }
        .form-group { text-align: left; margin-bottom: 1.5rem; }
        .form-group label { display: block; margin-bottom: 0.5rem; color: var(--text-muted); font-size: 0.9rem; }
        .form-group input {
            width: 100%;
            padding: 0.8rem 1rem;
            background: var(--bg-dark);
            border: 1px solid #1e293b;
            color: white;
            border-radius: 4px;
        }
    </style>
</head>
<body>

    <header>
        <div class="logo"><a href="index.html">Trade<span>Edge</span></a></div>
    </header>

    <div class="auth-container">
        <div class="auth-card">
            <h2>Reset Password</h2>
            <p>Enter the email associated with your account and we'll send you a link to reset your password.</p>
            <form action="#">
                <div class="form-group">
                    <label>Email Address</label>
                    <input type="email" required placeholder="trader@example.com">
                </div>
                <button type="submit" class="btn-solid" style="width: 100%;">Send Reset Link</button>
            </form>
            <br>
            <a href="login.html" style="color: var(--accent-green); font-size: 0.9rem;">← Back to Login</a>
        </div>
    </div>

</body>
</html>
