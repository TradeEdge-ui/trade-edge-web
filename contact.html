<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Contact Support | TradeEdge</title>
    <link rel="stylesheet" href="style.css">
    <style>
        .contact-container {
            padding: 6rem 5%;
            max-width: 800px;
            margin: 0 auto;
        }
        .contact-header {
            text-align: center;
            margin-bottom: 3rem;
        }
        .contact-header h1 {
            font-size: 3rem;
            margin-bottom: 1rem;
        }
        .contact-form {
            background: var(--bg-card);
            border: 1px solid #1e293b;
            padding: 3rem;
            border-radius: 12px;
        }
        .form-row {
            display: grid;
            grid-template-columns: 1fr 1fr;
            gap: 1.5rem;
            margin-bottom: 1.5rem;
        }
        .form-group {
            margin-bottom: 1.5rem;
        }
        .form-group label {
            display: block;
            margin-bottom: 0.5rem;
            color: var(--text-muted);
            font-size: 0.9rem;
        }
        .form-group input, .form-group select, .form-group textarea {
            width: 100%;
            padding: 0.8rem 1rem;
            background: var(--bg-dark);
            border: 1px solid #1e293b;
            color: white;
            border-radius: 4px;
            font-size: 1rem;
            transition: border-color 0.3s;
        }
        .form-group input:focus, .form-group select:focus, .form-group textarea:focus {
            outline: none;
            border-color: var(--accent-green);
        }
        .form-group textarea {
            height: 150px;
            resize: vertical;
        }
        
        /* Mobile adjustment for the form */
        @media (max-width: 600px) {
            .form-row {
                grid-template-columns: 1fr;
            }
        }
    </style>
</head>
<body>

    <header>
        <div class="logo"><a href="index.html">Trade<span>Edge</span></a></div>
        <ul class="nav-links">
            <li><a href="index.html#curriculum">The Curriculum</a></li>
            <li><a href="index.html#instructor">Instructor</a></li>
            <li><a href="login.html">Student Login</a></li>
        </ul>
        <a href="index.html#enroll" class="btn-outline">Join the Program</a>
    </header>

    <div class="contact-container">
        <div class="contact-header">
            <h1>Get in Touch</h1>
            <p style="color: var(--text-muted);">Have questions about the blueprint or need support with your account? Send us a message and our team will get back to you within 24 hours.</p>
        </div>

        <div class="contact-form">
            <form action="#" method="POST">
                <div class="form-row">
                    <div class="form-group">
                        <label for="firstName">First Name</label>
                        <input type="text" id="firstName" required>
                    </div>
                    <div class="form-group">
                        <label for="email">Email Address</label>
                        <input type="email" id="email" required>
                    </div>
                </div>
                
                <div class="form-group">
                    <label for="topic">What do you need help with?</label>
                    <select id="topic" required>
                        <option value="">Select a topic...</option>
                        <option value="presales">Pre-enrollment Question</option>
                        <option value="support">Student Technical Support</option>
                        <option value="billing">Billing Inquiry</option>
                    </select>
                </div>

                <div class="form-group">
                    <label for="message">Your Message</label>
                    <textarea id="message" required placeholder="How can we help you today?"></textarea>
                </div>

                <button type="submit" class="btn-solid" style="width: 100%;">Send Message</button>
            </form>
        </div>
    </div>

    <footer>
        <p>&copy; 2026 TradeEdge Education. All rights reserved.</p>
    </footer>

</body>
</html>
