<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Support Terminal | TradeEdge</title>
    
    <link href="https://fonts.googleapis.com/css2?family=Plus+Jakarta+Sans:wght@400;500;600;700;800&display=swap" rel="stylesheet">
    <script src="https://unpkg.com/scrollreveal"></script>

    <style>
        :root {
            --bg: #030712;
            --card: rgba(15, 23, 42, 0.7);
            --neon: #38bdf8;
            --neon-glow: rgba(56, 189, 248, 0.4);
            --text-main: #f8fafc;
            --text-muted: #94a3b8;
            --border: #1e293b;
            --success: #10b981;
        }

        * { margin: 0; padding: 0; box-sizing: border-box; }
        
        body { 
            font-family: 'Plus Jakarta Sans', sans-serif; 
            background: var(--bg); 
            color: var(--text-main); 
            line-height: 1.6;
            overflow-x: hidden;
            min-height: 100vh;
        }

        /* --- BACKGROUND BLUR --- */
        .neon-blur {
            position: fixed;
            width: 500px;
            height: 500px;
            background: var(--neon);
            filter: blur(180px);
            opacity: 0.08;
            border-radius: 50%;
            z-index: -1;
            top: 20%;
            left: 50%;
            transform: translate(-50%, -50%);
        }

        header {
            padding: 1.5rem 5%;
            display: flex;
            justify-content: space-between;
            align-items: center;
            backdrop-filter: blur(10px);
            border-bottom: 1px solid var(--border);
            position: sticky;
            top: 0;
            z-index: 100;
            background: rgba(3, 7, 18, 0.8);
        }

        .logo { font-weight: 800; font-size: 1.5rem; letter-spacing: -1px; }
        .logo a { color: var(--text-main); text-decoration: none; }
        .logo span { color: var(--neon); }

        .contact-container {
            padding: 6rem 5%;
            max-width: 900px;
            margin: 0 auto;
        }

        .contact-header {
            text-align: center;
            margin-bottom: 4rem;
        }

        .contact-header h1 {
            font-size: 3.5rem;
            font-weight: 800;
            letter-spacing: -2px;
            margin-bottom: 1rem;
        }

        .status-pill {
            display: inline-flex;
            align-items: center;
            gap: 8px;
            background: rgba(16, 185, 129, 0.1);
            color: var(--success);
            padding: 6px 16px;
            border-radius: 100px;
            font-size: 0.75rem;
            font-weight: 800;
            margin-bottom: 1.5rem;
            border: 1px solid rgba(16, 185, 129, 0.2);
        }

        .status-dot {
            width: 8px;
            height: 8px;
            background: var(--success);
            border-radius: 50%;
            box-shadow: 0 0 10px var(--success);
            animation: pulse 2s infinite;
        }

        @keyframes pulse {
            0% { opacity: 1; }
            50% { opacity: 0.4; }
            100% { opacity: 1; }
        }

        .contact-form {
            background: var(--card);
            backdrop-filter: blur(20px);
            border: 1px solid var(--border);
            padding: 4rem;
            border-radius: 32px;
            box-shadow: 0 25px 50px rgba(0,0,0,0.5);
        }

        .form-row {
            display: grid;
            grid-template-columns: 1fr 1fr;
            gap: 1.5rem;
            margin-bottom: 1.5rem;
        }

        .form-group {
            margin-bottom: 1.5rem;
        }

        .form-group label {
            display: block;
            margin-bottom: 0.6rem;
            color: var(--text-muted);
            font-size: 0.8rem;
            font-weight: 700;
            text-transform: uppercase;
            letter-spacing: 1px;
        }

        .form-group input, .form-group select, .form-group textarea {
            width: 100%;
            padding: 14px 18px;
            background: rgba(3, 7, 18, 0.5);
            border: 1px solid var(--border);
            color: white;
            border-radius: 12px;
            font-family: inherit;
            font-size: 1rem;
            transition: 0.3s;
        }

        .form-group input:focus, .form-group select:focus, .form-group textarea:focus {
            outline: none;
            border-color: var(--neon);
            box-shadow: 0 0 15px var(--neon-glow);
        }

        .form-group textarea {
            height: 150px;
            resize: vertical;
        }

        .btn-neon {
            background: var(--neon);
            color: #000;
            width: 100%;
            padding: 18px;
            border: none;
            border-radius: 14px;
            font-weight: 800;
            font-size: 1rem;
            cursor: pointer;
            transition: 0.3s;
            text-transform: uppercase;
            letter-spacing: 1px;
            box-shadow: 0 10px 25px var(--neon-glow);
        }

        .btn-neon:hover {
            transform: translateY(-3px);
            box-shadow: 0 15px 35px var(--neon-glow);
        }

        @media (max-width: 768px) {
            .contact-form { padding: 2rem; }
            .form-row { grid-template-columns: 1fr; }
            .contact-header h1 { font-size: 2.5rem; }
        }

        footer {
            padding: 4rem 5%;
            text-align: center;
            color: var(--text-muted);
            font-size: 0.9rem;
        }
    </style>
</head>
<body>

    <div class="neon-blur"></div>

    <header>
        <div class="logo"><a href="index.html">TRADE<span>EDGE</span></a></div>
        <a href="login.html" style="color: var(--neon); text-decoration: none; font-weight: 700; font-size: 0.9rem;">STUDENT LOGIN</a>
    </header>

    <div class="contact-container reveal">
        <div class="contact-header">
            <div class="status-pill">
                <div class="status-dot"></div>
                SUPPORT TEAM ONLINE
            </div>
            <h1>Get in <span>Touch.</span></h1>
            <p style="color: var(--text-muted); max-width: 600px; margin: 0 auto;">Have questions about the institutional framework or need technical assistance with your terminal? We usually respond within 12-24 hours.</p>
        </div>

        <div class="contact-form">
            <form action="https://formspree.io/f/your-id" method="POST"> <div class="form-row">
                    <div class="form-group">
                        <label for="firstName">First Name</label>
                        <input type="text" name="firstName" id="firstName" placeholder="Enter name" required>
                    </div>
                    <div class="form-group">
                        <label for="email">Email Address</label>
                        <input type="email" name="email" id="email" placeholder="trader@example.com" required>
                    </div>
                </div>
                
                <div class="form-group">
                    <label for="topic">Inquiry Subject</label>
                    <select name="topic" id="topic" required>
                        <option value="" disabled selected>Select a topic...</option>
                        <option value="presales">Pre-enrollment Question</option>
                        <option value="support">Student Technical Support</option>
                        <option value="billing">Billing & Access</option>
                        <option value="partnership">Partnership Opportunities</option>
                    </select>
                </div>

                <div class="form-group">
                    <label for="message">Detailed Message</label>
                    <textarea name="message" id="message" required placeholder="Describe your inquiry in detail..."></textarea>
                </div>

                <button type="submit" class="btn-neon">Transmit Message</button>
            </form>
        </div>
    </div>

    <footer>
        <p>&copy; 2026 TradeEdge Elite Terminal. All transmissions are encrypted.</p>
    </footer>

    <script>
        ScrollReveal().reveal('.reveal', { 
            duration: 1000, 
            distance: '30px', 
            origin: 'bottom', 
            opacity: 0, 
            easing: 'cubic-bezier(0.5, 0, 0, 1)' 
        });
    </script>
</body>
</html>
