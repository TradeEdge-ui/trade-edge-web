<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>TradeEdge | Secure Checkout</title>
    <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2.39.7/dist/umd/supabase.js"></script>
    <link href="https://fonts.googleapis.com/css2?family=Plus+Jakarta+Sans:wght@400;600;700&display=swap" rel="stylesheet">
    <style>
        :root { --bg: #05070a; --card: #0a0d14; --accent: #3b82f6; --text-primary: #ffffff; --text-secondary: #94a3b8; --border: #1e293b; }
        body { font-family: 'Plus Jakarta Sans', sans-serif; background: var(--bg); color: var(--text-primary); margin: 0; display: flex; align-items: center; justify-content: center; min-height: 100vh; }
        .checkout-card { background: var(--card); border: 1px solid var(--border); padding: 2.5rem; border-radius: 24px; width: 100%; max-width: 450px; box-shadow: 0 20px 40px rgba(0,0,0,0.4); text-align: center; }
        .price-tag { font-size: 3.5rem; font-weight: 800; margin: 1.5rem 0; color: var(--accent); display: flex; align-items: baseline; justify-content: center; gap: 8px; }
        .btn-pay { background: var(--accent); color: white; border: none; width: 100%; padding: 18px; border-radius: 12px; font-weight: 700; cursor: pointer; font-size: 1rem; transition: 0.2s; text-transform: uppercase; letter-spacing: 1px; }
        .btn-pay:disabled { background: #1e293b; cursor: not-allowed; opacity: 0.6; }
        .status-msg { font-size: 0.85rem; margin-top: 15px; color: #ef4444; display: none; }
    </style>
</head>
<body>

    <div class="checkout-card">
        <h1 style="margin: 10px 0 0 0;">Elite Lifetime Access</h1>
        <div class="price-tag"><span style="font-size: 1.2rem; color: var(--text-secondary);">RM</span> 499</div>
        
        <button class="btn-pay" id="pay-button">PAY VIA CARD / GRABPAY</button>
        <div id="error-msg" class="status-msg"></div>

        <div style="margin-top: 2.5rem; opacity: 0.6;">
            <img src="https://upload.wikimedia.org/wikipedia/commons/b/ba/Stripe_Logo%2C_revised_2009.svg" width="60" style="filter: brightness(0) invert(1);">
        </div>
    </div>

    <script>
       // ==========================================
// THE BULLETPROOF SCRIPT
// ==========================================
const SUPABASE_URL = 'https://mdefpesnbawqlzfygaqt.supabase.co'; 
const SUPABASE_KEY = 'eyJhbGciOiJIUzI1NiIsInR5cCI6IkpXVCJ9.eyJpc3MiOiJzdXBhYmFzZSIsInJlZiI6Im1kZWZwZXNuYmF3cWx6ZnlnYXF0Iiwicm9sZSI6ImFub24iLCJpYXQiOjE3NzU1NzQ0NzAsImV4cCI6MjA5MTE1MDQ3MH0.aORQwc6xJXeVmwTsa2Ql_bpCQTThwFfEYYjZKNTlNAg'; // Replace this
const STRIPE_PRICE_ID = 'price_1TJdt9JtJHqxmXmNM0NlKD6J'; // Replace this (price_...)

const supabaseClient = supabase.createClient(SUPABASE_URL, SUPABASE_KEY);

document.getElementById('pay-button').addEventListener('click', async () => {
    const btn = document.getElementById('pay-button');
    const errorBox = document.getElementById('error-msg');
    
    // 1. Check if user is logged in
    const { data: { user } } = await supabaseClient.auth.getUser();
    if (!user) {
        alert("Please log in first!");
        return;
    }

    btn.disabled = true;
    btn.innerText = "Connecting...";

    try {
        // 2. Get the session for the security token
        const { data: sessionData } = await supabaseClient.auth.getSession();
        
        // 3. THIS IS THE CRITICAL PART: The full URL must be in single quotes
        const response = await fetch('https://mdefpesnbawqlzfygaqt.supabase.co/functions/v1/create-stripe-session', {
            method: 'POST',
            headers: { 
                'Content-Type': 'application/json',
                'Authorization': `Bearer ${sessionData.session.access_token}`
            },
            body: JSON.stringify({ 
                email: user.email,
                priceId: STRIPE_PRICE_ID 
            })
        });

        const data = await response.json();

        if (data.url) {
            window.location.href = data.url; // This takes you to Stripe
        } else {
            throw new Error(data.error || "The function didn't return a payment link.");
        }

    } catch (err) {
        console.error("Error Details:", err);
        errorBox.innerText = err.message;
        errorBox.style.display = "block";
        btn.disabled = false;
        btn.innerText = "PAY VIA CARD / GRABPAY";
    }
});
    </script>
</body>
</html>
